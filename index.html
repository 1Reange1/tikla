<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İyi Ki Doğdun Genç</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0b0914; /* Derin gece siyahı */
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
            user-select: none;
        }

        /* Giriş Ekranı (Ekrana Tıkla) */
        #click-prompt {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #a2a1a8;
            animation: pulse 2s infinite ease-in-out;
            transition: opacity 0.4s ease;
            text-align: center;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }

        /* Ana Kart Tasarımı */
        #content {
            display: none;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            padding: 20px;
        }

        #content.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* Pasta Alanı */
        .cake-wrapper {
            position: relative;
            font-size: 6rem; /* Pasta boyutu */
            margin-bottom: 10px;
            display: inline-block;
            animation: float 3s infinite ease-in-out;
        }

        /* Pastanın üzerindeki 19 mum efekti */
        .age-badge {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
            font-size: 1.2rem;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(255, 65, 108, 0.4);
            border: 2px solid #0b0914;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Yazı Stilleri */
        h1 {
            font-size: 3.2rem;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.5rem;
            font-weight: 400;
            color: #b3b3b3;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div id="click-prompt">Ekrana tıkla... ✨</div>

    <div id="content">
        <div class="cake-wrapper">
            <div class="age-badge">19</div>
            🎂
        </div>
        <h1>Doğum günün kutlu olsun</h1>
        <p>Nice mutlu senelere</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        const body = document.body;
        const prompt = document.getElementById('click-prompt');
        const content = document.getElementById('content');

        body.addEventListener('click', () => {
            if (prompt.style.display === 'none') return;

            prompt.style.display = 'none';
            content.style.display = 'block';
            
            setTimeout(() => {
                content.classList.add('show');
            }, 50);

            // Havai fişek tarzı patlama etkisi
            const duration = 4 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 4,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0, y: 0.8 },
                    colors: ['#ff416c', '#ff4b2b', '#fecfef', '#ff9a9e']
                });
                confetti({
                    particleCount: 4,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1, y: 0.8 },
                    colors: ['#ff416c', '#ff4b2b', '#fecfef', '#ff9a9e']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        });
    </script>
</body>
</html>
